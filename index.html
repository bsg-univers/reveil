<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f8c8dc">
<link rel="manifest" href="manifest.json">
<title>Réveil</title>

<style>
:root{
--bg1:#fdfbfb;
--bg2:#ebedee;
--card:#ffffff;
--accent:#f8c8dc;
--circle:#c7f0db;
--text:#333;
}

body.dark{
--bg1:#1e1f26;
--bg2:#2a2c35;
--card:#2f3240;
--accent:#ff8fb1;
--circle:#7de2c3;
--text:#f1f1f1;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:linear-gradient(160deg,var(--bg1),var(--bg2));
color:var(--text);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
transition:0.4s;
}

.container{
width:95%;
max-width:420px;
background:var(--card);
border-radius:28px;
padding:25px;
box-shadow:0 25px 60px rgba(0,0,0,0.15);
text-align:center;
}

.circle-wrapper{
margin-top:10px;
position:relative;
width:240px;
height:240px;
margin-left:auto;
margin-right:auto;
}

svg{
transform:rotate(-90deg);
}

circle{
fill:none;
stroke-width:12;
stroke-linecap:round;
}

.bg{
stroke:rgba(0,0,0,0.05);
}

.progress{
stroke:var(--circle);
stroke-dasharray:690;
stroke-dashoffset:690;
transition:stroke-dashoffset 1s linear;
}

.center-flower{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:55px;
opacity:0.25;
transition:0.6s ease;
}

.center-flower.animate{
transform:translate(-50%,-50%) scale(1.8);
opacity:0.5;
}

.time{
margin-top:10px;
font-size:22px;
font-weight:500;
}

.buttons{
margin-top:20px;
display:flex;
flex-wrap:wrap;
gap:8px;
justify-content:center;
}

button{
padding:10px 14px;
border:none;
border-radius:16px;
background:var(--accent);
cursor:pointer;
font-size:14px;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

select{
margin-top:15px;
padding:8px;
border-radius:12px;
border:none;
background:var(--bg2);
color:var(--text);
}

.controls{
margin-top:15px;
display:flex;
justify-content:center;
gap:10px;
}

.stop{
background:#ff8f8f;
}

.mode{
position:absolute;
top:15px;
right:15px;
font-size:18px;
cursor:pointer;
}

input[type="range"]{
width:80%;
margin-top:8px;
}

@media(max-width:420px){
.circle-wrapper{
width:200px;
height:200px;
}
}
</style>

</head>

<body>

<div class="mode" onclick="toggleMode()">🌙</div>

<div class="container">

<div class="circle-wrapper">
<svg width="240" height="240">
<circle class="bg" cx="120" cy="120" r="110"></circle>
<circle class="progress" cx="120" cy="120" r="110"></circle>
</svg>
<div class="center-flower" id="flower">🌸</div>
</div>

<div class="time" id="timeDisplay">00:00</div>

<div class="buttons">
<button onclick="startTimer(5)">5m</button>
<button onclick="startTimer(10)">10m</button>
<button onclick="startTimer(15)">15m</button>
<button onclick="startTimer(20)">20m</button>
<button onclick="startTimer(25)">25m</button>
<button onclick="startTimer(30)">30m</button>
<button onclick="customTime()">+</button>
</div>

<select id="soundSelect"></select>

<div>
<label>Volume</label><br>
<input type="range" id="volumeControl" min="0" max="1" step="0.01" value="0.8">
</div>

<div class="controls">
<button class="stop" onclick="stopTimer()">Stop</button>
</div>

</div>

<script>

let totalTime=0;
let remainingTime=0;
let interval;
let audio;
let timerQueue = [];
let currentIndex = 0;

async function loadSounds() {

    try {

        const response = await fetch("sounds.json");
        const data = await response.json();
        const select = document.getElementById("soundSelect");

        data.sounds.forEach((file, index) => {

            const option = document.createElement("option");

            option.value = file;
            option.textContent = file.replace(/\.[^/.]+$/, "");

            select.appendChild(option);

            // sélectionner le premier son automatiquement
            if(index === 0){
                select.value = file;
            }

        });

    } catch (error) {

        console.error("Erreur chargement sons :", error);

    }

}

loadSounds();

function startTimer(minutes){

    // si on clique plusieurs fois → on empile les durées
    timerQueue.push(minutes);
    
    // si un timer tourne déjà, on ne redémarre pas
    if(interval) return;
    
    currentIndex = 0;
    launchNextTimer();

}

function launchNextTimer(){

if(currentIndex >= timerQueue.length){
timerQueue = [];
return;
}

clearInterval(interval);

remainingTime = timerQueue[currentIndex] * 60;
totalTime = remainingTime;

update();

interval = setInterval(()=>{

remainingTime--;
update();
growFlower();

if(remainingTime <= 0){

clearInterval(interval);
finishAnimation();
playSound();

currentIndex++;
setTimeout(launchNextTimer, 3000); // pause de 3 sec entre les sonneries

}

},1000);

}

function launchNextTimer(){

if(currentIndex >= timerQueue.length){
timerQueue = [];
return;
}

clearInterval(interval);

remainingTime = timerQueue[currentIndex] * 60;
totalTime = remainingTime;

update();

interval = setInterval(()=>{

remainingTime--;
update();
growFlower();

if(remainingTime <= 0){

clearInterval(interval);
finishAnimation();
playSound();

currentIndex++;
setTimeout(launchNextTimer, 3000); // pause de 3 sec entre les sonneries

}

},1000);

}

function growFlower(){

let progress = 1 - (remainingTime / totalTime);

/* taille entre 0.6 et 1.8 */
let scale = 0.6 + progress * 1.2;

/* opacité progressive */
let opacity = 0.2 + progress * 0.6;

let flower = document.getElementById("flower");

flower.style.transform = `translate(-50%,-50%) scale(${scale})`;
flower.style.opacity = opacity;

}

    
function stopTimer(){

clearInterval(interval);

if(audio){
audio.pause();
audio.currentTime=0;
}

remainingTime=0;
update();

}

function customTime(){

let m=prompt("Minutes ?");

if(m>0){
startTimer(parseInt(m));
}

}

function update(){

let min=Math.floor(remainingTime/60);
let sec=remainingTime%60;

document.getElementById("timeDisplay").textContent=
`${String(min).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;

let circle=document.querySelector(".progress");
let circumference=690;
let progress = 1 - (remainingTime/totalTime);

circle.style.strokeDashoffset=circumference*(1-progress);

}

function playSound(){

const volumeTarget = parseFloat(document.getElementById("volumeControl").value);

const file = document.getElementById("soundSelect").value;

if(!file){
console.warn("Aucun son sélectionné");
return;
}
audio = new Audio("sounds/" + file);
  
audio.volume = 0;
audio.loop = true;

audio.play().catch(err=>{
console.log("Erreur audio :", err);
});

let vol = 0;

/* fade-in */
let fadeIn = setInterval(()=>{

vol += 0.02;

if(vol >= volumeTarget){
vol = volumeTarget;
clearInterval(fadeIn);
}

audio.volume = vol;

},120);


/* fade-out après 17 secondes */
setTimeout(()=>{

let fadeOut = setInterval(()=>{

vol -= 0.03;

if(vol <= 0){
vol = 0;
clearInterval(fadeOut);
}

audio.volume = vol;

},100);

},17000);


/* arrêt complet après 20 secondes */
setTimeout(()=>{

if(audio){
audio.pause();
audio.currentTime = 0;
}

},20000);

}

function finishAnimation(){

document.getElementById("flower").classList.add("animate");

setTimeout(()=>{
document.getElementById("flower").classList.remove("animate");
},4000);

}

function toggleMode(){
document.body.classList.toggle("dark");
}

</script>

<script>
if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
