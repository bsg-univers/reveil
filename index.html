<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Réveil</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #fceff9, #e0f7fa);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    text-align: center;
    width: 350px;
}

h1 {
    margin-bottom: 25px;
    color: #555;
}

.buttons button {
    margin: 5px;
    padding: 10px 15px;
    border: none;
    border-radius: 12px;
    background: #d0f0fd;
    cursor: pointer;
    transition: 0.3s;
}

.buttons button:hover {
    background: #aee3f7;
}

.custom-input {
    margin-top: 15px;
}

input {
    padding: 8px;
    width: 80px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.start-btn {
    margin-top: 10px;
    padding: 8px 15px;
    border-radius: 10px;
    border: none;
    background: #ffd6e8;
    cursor: pointer;
}

.start-btn:hover {
    background: #ffb3d1;
}

.circle-container {
    margin-top: 25px;
    position: relative;
    width: 150px;
    height: 150px;
    margin-left: auto;
    margin-right: auto;
}

svg {
    transform: rotate(-90deg);
}

circle {
    fill: none;
    stroke-width: 10;
    stroke-linecap: round;
}

.bg {
    stroke: #eee;
}

.progress {
    stroke: #9be7c4;
    stroke-dasharray: 440;
    stroke-dashoffset: 440;
    transition: stroke-dashoffset 1s linear;
}

.time-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 18px;
    color: #666;
}
</style>
</head>

<body>

<div class="container">
    <h1>Mon Réveil 🌸</h1>

    <div class="buttons">
        <button onclick="startTimer(5)">5 min</button>
        <button onclick="startTimer(15)">15 min</button>
        <button onclick="startTimer(20)">20 min</button>
        <button onclick="startTimer(30)">30 min</button>
    </div>

    <div class="custom-input">
        <input type="number" id="customTime" placeholder="min">
        <button class="start-btn" onclick="startCustom()">OK</button>
    </div>

    <div class="circle-container">
        <svg width="150" height="150">
            <circle class="bg" cx="75" cy="75" r="70"></circle>
            <circle class="progress" cx="75" cy="75" r="70"></circle>
        </svg>
        <div class="time-text" id="timeDisplay">--:--</div>
    </div>
</div>

<script>
let timerInterval;
let totalTime = 0;
let remainingTime = 0;
let audioCtx;

function startCustom() {
    const value = parseInt(document.getElementById("customTime").value);
    if (value > 0) {
        startTimer(value);
    }
}

function startTimer(minutes) {
    clearInterval(timerInterval);

    totalTime = minutes * 60;
    remainingTime = totalTime;

    updateDisplay();
    updateCircle();

    timerInterval = setInterval(() => {
        remainingTime--;
        updateDisplay();
        updateCircle();

        if (remainingTime <= 0) {
            clearInterval(timerInterval);
            playSound();
        }
    }, 1000);
}

function updateDisplay() {
    let min = Math.floor(remainingTime / 60);
    let sec = remainingTime % 60;
    document.getElementById("timeDisplay").textContent =
        `${min.toString().padStart(2,"0")}:${sec.toString().padStart(2,"0")}`;
}

function updateCircle() {
    const circle = document.querySelector(".progress");
    const circumference = 440;
    const progress = remainingTime / totalTime;
    circle.style.strokeDashoffset = circumference * (1 - progress);
}

function playSound() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    oscillator.type = "sine";
    oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
    gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    oscillator.start();

    setTimeout(() => {
        oscillator.stop();
        audioCtx.close();
    }, 10000);
}
</script>

</body>
</html>
