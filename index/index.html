<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Réveil Pastel</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --accent-color: #a8dadc;
            --text-color: #457b9d;
            --button-hover: #f1faee;
            --circle-bg: #e1eaf2;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 { font-weight: 300; margin-bottom: 30px; }

        /* Conteneur du cercle */
        .timer-container {
            position: relative;
            width: 250px;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }

        svg {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        circle {
            fill: none;
            stroke-width: 8;
            stroke-linecap: round;
        }

        .circle-bg { stroke: var(--circle-bg); }
        
        .circle-progress {
            stroke: var(--accent-color);
            stroke-dasharray: 754; /* 2 * PI * R (R=120) */
            stroke-dashoffset: 754;
            transition: stroke-dashoffset 1s linear;
        }

        .time-display {
            position: absolute;
            font-size: 2.5rem;
            font-weight: bold;
        }

        /* Boutons */
        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        button {
            padding: 15px 25px;
            border: 2px solid var(--accent-color);
            background: white;
            color: var(--text-color);
            border-radius: 20px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: var(--accent-color);
            color: white;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h1>Douce Alerte</h1>

    <div class="timer-container">
        <svg>
            <circle class="circle-bg" cx="125" cy="125" r="120"></circle>
            <circle class="circle-progress" id="progress" cx="125" cy="125" r="120"></circle>
        </svg>
        <div class="time-display" id="display">00:00</div>
    </div>

    <div class="options">
        <button onclick="startTimer(10)">10 Min</button>
        <button onclick="startTimer(15)">15 Min</button>
        <button onclick="startTimer(20)">20 Min</button>
        <button onclick="startTimer(30)">30 Min</button>
    </div>

    <audio id="alarm-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

    <script>
        let countdown;
        const display = document.getElementById('display');
        const progressCircle = document.getElementById('progress');
        const alarm = document.getElementById('alarm-sound');
        const totalDash = 754;

        function startTimer(minutes) {
            clearInterval(countdown);
            alarm.pause();
            alarm.currentTime = 0;

            const seconds = minutes * 60;
            const now = Date.now();
            const then = now + seconds * 1000;

            updateDisplay(seconds);
            updateCircle(1);

            countdown = setInterval(() => {
                const secondsLeft = Math.round((then - Date.now()) / 1000);

                if (secondsLeft < 0) {
                    clearInterval(countdown);
                    playAlarm();
                    return;
                }

                updateDisplay(secondsLeft);
                updateCircle(secondsLeft / seconds);
            }, 1000);
        }

        function updateDisplay(seconds) {
            const mins = Math.floor(seconds / 60);
            const remainderSeconds = seconds % 60;
            display.textContent = `${mins}:${remainderSeconds < 10 ? '0' : ''}${remainderSeconds}`;
        }

        function updateCircle(percent) {
            const offset = totalDash - (percent * totalDash);
            progressCircle.style.strokeDashoffset = offset;
        }

        function playAlarm() {
            alarm.play();
            // Arrête le son après 10 secondes
            setTimeout(() => {
                alarm.pause();
                alarm.currentTime = 0;
            }, 10000);
        }
    </script>
</body>
</html>
